<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneMind - Emotion Music</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Animated background blobs */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: blobMove 8s ease-in-out infinite alternate;
        }

        .blob1 {
            width: 400px; height: 400px;
            background: #7c3aed;
            top: -100px; left: -100px;
            animation-duration: 7s;
        }

        .blob2 {
            width: 350px; height: 350px;
            background: #ec4899;
            bottom: -80px; right: -80px;
            animation-duration: 9s;
            animation-delay: -3s;
        }

        .blob3 {
            width: 300px; height: 300px;
            background: #06b6d4;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 11s;
            animation-delay: -5s;
        }

        @keyframes blobMove {
            0%   { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(30px, -30px); }
        }

        .blob3 {
            animation: blobMove3 11s ease-in-out infinite alternate;
        }

        @keyframes blobMove3 {
            0%   { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-40%, -60%) scale(1.3); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px 40px;
            width: 90%;
            max-width: 580px;
            text-align: center;
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.15);
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.5); }
            50%       { box-shadow: 0 0 0 12px rgba(124, 58, 237, 0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #ec4899, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: gradientShift 4s ease infinite;
        }

        @keyframes gradientShift {
            0%   { background-position: 0%; }
            50%  { background-position: 100%; }
            100% { background-position: 0%; }
        }

        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.88rem;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* Textarea */
        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            height: 110px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            resize: none;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }

        /* Button */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.08);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.5s;
        }

        button:hover::after {
            transform: rotate(45deg) translateX(100%);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Emotion badge */
        .emotion-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            margin-bottom: 16px;
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes badgePop {
            0%   { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .happy   { background: rgba(249,202,36,0.15); border: 1px solid #f9ca24; color: #f9ca24; }
        .sad     { background: rgba(74,144,226,0.15); border: 1px solid #4a90e2; color: #4a90e2; }
        .angry   { background: rgba(229,80,57,0.15);  border: 1px solid #e55039; color: #e55039; }
        .relaxed { background: rgba(29,185,84,0.15);  border: 1px solid #1db954; color: #1db954; }
        .neutral { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; }

        /* Player */
        .player-wrapper {
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            0%   { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Loading dots */
        .loading {
            margin-top: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px; height: 8px;
            background: #7c3aed;
            border-radius: 50%;
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; background: #ec4899; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: #06b6d4; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40%            { transform: scale(1.2); opacity: 1; }
        }

        .error {
            margin-top: 20px;
            color: #e55039;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="container">
        <div class="logo">
            <div class="logo-icon">🎵</div>
            <h1>TuneMind</h1>
        </div>
        <p class="subtitle">Tell us how you feel — we'll find your perfect song.</p>

        <textarea id="textInput" placeholder="I'm feeling so happy today..."></textarea>
        <button id="analyzeBtn">✨ Analyze & Play Music</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
